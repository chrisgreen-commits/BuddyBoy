<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebHandheld Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --body-color: #1c1c1e;
            --screen-bg: #000;
            --button-color: #2c2c2e;
            --accent-color: #3a3a3c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            user-select: none;
            touch-action: none;
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--body-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Screen Section - Exactly 60% HEIGHT */
        .screen-section {
            width: 100%;
            flex: 0 0 60%; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            will-change: transform; /* Hint for performance */
        }

        #game-iframe {
            border: none;
            background: #000;
            transition: all 0.3s ease;
        }

        /* Display Modes */
        .mode-fit { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 16 / 9; 
            object-fit: contain; 
        }
        
        .mode-stretch { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: fill; 
        }
        
        .mode-crop { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover;
            transform: scale(1.1); /* Slight boost to ensure coverage */
        }

        /* Controls Section - Exactly 40% HEIGHT */
        .controls-section {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            padding: 10px 20px env(safe-area-inset-bottom);
            justify-content: space-around;
            background: linear-gradient(to bottom, #2c2c2e, #1c1c1e);
            border-top: 1px solid #3a3a3c;
            position: relative;
        }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .dpad-wrapper {
            position: relative;
            width: clamp(110px, 32vw, 150px);
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .dpad-hat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            background: radial-gradient(circle at 30% 30%, #444, #18181b);
            border-radius: 50%;
            clip-path: polygon(33% 0%, 67% 0%, 67% 33%, 100% 33%, 100% 67%, 67% 67%, 67% 100%, 33% 100%, 33% 67%, 0% 67%, 0% 33%, 33% 33%);
            transition: transform 0.1s ease;
            pointer-events: none;
        }

        .zone { position: absolute; width: 33%; height: 33%; z-index: 20; }
        .z-u { top: 0; left: 33.5%; }
        .z-d { bottom: 0; left: 33.5%; }
        .z-l { left: 0; top: 33.5%; }
        .z-r { right: 0; top: 33.5%; }
        .z-ul { top: 5%; left: 5%; }
        .z-ur { top: 5%; right: 5%; }
        .z-dl { bottom: 5%; left: 5%; }
        .z-dr { bottom: 5%; right: 5%; }

        .action-cluster {
            display: grid;
            grid-template-areas: ". y ." "x . b" ". a .";
            gap: 8px;
            width: clamp(110px, 32vw, 150px);
            aspect-ratio: 1/1;
        }

        .btn {
            width: 100%;
            height: 100%;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 0 #000;
            font-size: 1.1rem;
        }

        .btn-y { grid-area: y; border: 1px solid #facc1533; }
        .btn-x { grid-area: x; border: 1px solid #60a5fa33; }
        .btn-b { grid-area: b; border: 1px solid #f8717133; }
        .btn-a { grid-area: a; border: 1px solid #4ade8033; }

        .active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
            filter: brightness(1.3);
        }

        .shoulder-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .shoulder-btn {
            width: 32%;
            height: 36px;
            background: #1c1c1e;
            border-radius: 8px;
            border: 1px solid #3a3a3c;
            color: #8e8e93;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .menu-row {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .menu-btn {
            width: 40px;
            height: 10px;
            background: #111;
            border-radius: 5px;
            border-bottom: 2px solid #444;
        }

        #settings-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 12, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 30px 24px;
            color: white;
            overflow-y: auto;
        }

        .gear-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 50;
            color: #ffffff;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            backdrop-filter: blur(8px);
        }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #8e8e93; margin-bottom: 6px; }
        input { background: #2c2c2e; color: white; border: 1px solid #3a3a3c; padding: 12px; border-radius: 8px; width: 100%; }

        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-option {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
            color: #8e8e93;
        }

        .mode-option.active-mode {
            background: #3b82f6;
            border-color: #60a5fa;
            color: white;
            font-weight: bold;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #93c5fd;
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="gear-icon" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <div id="settings-overlay">
            <h2 class="text-xl font-bold mb-6">Console Settings</h2>
            
            <div class="input-group">
                <label>Game Source URL</label>
                <input type="text" id="url-input" placeholder="https://game-site.com">
            </div>

            <div class="input-group">
                <label>Screen Ratio Mode</label>
                <div class="mode-selector">
                    <div class="mode-option" id="opt-fit" onclick="setMode('fit')">16:9<br>Fit</div>
                    <div class="mode-option" id="opt-stretch" onclick="setMode('stretch')">Full<br>Stretch</div>
                    <div class="mode-option" id="opt-crop" onclick="setMode('crop')">Full<br>Crop</div>
                </div>
            </div>

            <div class="mt-2 flex flex-col gap-3">
                <button onclick="saveSettings()" class="bg-blue-600 py-4 rounded-xl font-bold text-lg">Apply & Restart</button>
                <button onclick="toggleSettings()" class="text-zinc-500 py-2">Back to Game</button>
            </div>

            <div class="info-box mt-6">
                <p class="font-bold mb-1"><i class="fas fa-bolt mr-2"></i>Performance Tip</p>
                <p class="opacity-80">If the game feels slow, try "Apply & Restart". Some browsers throttle background iframes until interaction occurs.</p>
            </div>
        </div>

        <!-- 60% Screen -->
        <div class="screen-section">
            <iframe id="game-iframe" src="about:blank" scrolling="no" allow="autoplay; gamepad"></iframe>
        </div>

        <!-- 40% Controls -->
        <div class="controls-section">
            <div class="shoulder-row">
                <div class="shoulder-btn" data-btn="4" data-keys="q">L</div>
                <div class="shoulder-btn" data-btn="5" data-keys="e">R</div>
            </div>

            <div class="main-controls">
                <div class="dpad-wrapper">
                    <div class="dpad-hat"></div>
                    <div class="zone z-u" data-btn="12" data-keys="ArrowUp,w"></div>
                    <div class="zone z-d" data-btn="13" data-keys="ArrowDown,s"></div>
                    <div class="zone z-l" data-btn="14" data-keys="ArrowLeft,a"></div>
                    <div class="zone z-r" data-btn="15" data-keys="ArrowRight,d"></div>
                    <div class="zone z-ul" data-btns="12,14" data-keys="ArrowUp,ArrowLeft,w,a"></div>
                    <div class="zone z-ur" data-btns="12,15" data-keys="ArrowUp,ArrowRight,w,d"></div>
                    <div class="zone z-dl" data-btns="13,14" data-keys="ArrowDown,ArrowLeft,s,a"></div>
                    <div class="zone z-dr" data-btns="13,15" data-keys="ArrowDown,ArrowRight,s,d"></div>
                </div>

                <div class="action-cluster">
                    <div class="btn btn-y" data-btn="3" data-keys="i">Y</div>
                    <div class="btn btn-x" data-btn="2" data-keys="j">X</div>
                    <div class="btn btn-b" data-btn="1" data-keys="Escape,Shift">B</div>
                    <div class="btn btn-a" data-btn="0" data-keys="Enter, ">A</div>
                </div>
            </div>

            <div class="menu-row">
                <div class="menu-btn" data-btn="8" data-keys="Tab"></div>
                <div class="menu-btn" data-btn="9" data-keys="p"></div>
            </div>
        </div>
    </div>

    <script>
        const virtualGamepad = {
            id: "Handheld Virtual Controller",
            index: 0, connected: true, timestamp: performance.now(), mapping: "standard",
            axes: [0, 0, 0, 0],
            buttons: Array(17).fill(0).map(() => ({ pressed: false, touched: false, value: 0 }))
        };

        navigator.getGamepads = () => [virtualGamepad, null, null, null];

        let currentMode = 'fit';

        function triggerConnection() {
            try {
                const event = new Event('gamepadconnected');
                Object.defineProperty(event, 'gamepad', { value: virtualGamepad, enumerable: true });
                window.dispatchEvent(event);
            } catch (e) {}
        }

        function setMode(mode) {
            currentMode = mode;
            const iframe = document.getElementById('game-iframe');
            iframe.className = '';
            iframe.classList.add('mode-' + mode);
            
            document.querySelectorAll('.mode-option').forEach(el => el.classList.remove('active-mode'));
            document.getElementById('opt-' + mode).classList.add('active-mode');
        }

        function sendKey(key, type) {
            const iframe = document.getElementById('game-iframe');
            if (!iframe.contentWindow) return;
            
            // Critical for performance: focus the iframe on interaction
            iframe.focus();

            try {
                iframe.contentWindow.postMessage({ type: 'keyboard-bridge', keyAction: type, key: key }, "*");
                if (iframe.contentWindow.dispatchEvent) {
                    const kbEvent = new KeyboardEvent(type, {
                        key: key,
                        code: key.length === 1 ? `Key${key.toUpperCase()}` : key,
                        bubbles: true,
                        cancelable: true
                    });
                    iframe.contentWindow.dispatchEvent(kbEvent);
                }
            } catch (err) {}
        }

        const iframe = document.getElementById('game-iframe');
        const overlay = document.getElementById('settings-overlay');
        const urlInput = document.getElementById('url-input');

        function toggleSettings() {
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveSettings() {
            const url = urlInput.value || 'https://www.google.com/logos/2010/pacman10-i.html';
            iframe.src = url;
            localStorage.setItem('vb_url_v4', url);
            localStorage.setItem('vb_mode_v4', currentMode);
            toggleSettings();
            setTimeout(triggerConnection, 1000);
        }

        function handleInput(el, isPressed) {
            const btnIdx = el.getAttribute('data-btn');
            const btnsIdx = el.getAttribute('data-btns');
            const keys = el.getAttribute('data-keys')?.split(',') || [];

            const apply = (idx) => {
                const i = parseInt(idx);
                virtualGamepad.buttons[i].pressed = isPressed;
                virtualGamepad.buttons[i].value = isPressed ? 1 : 0;
            };

            if (btnIdx) apply(btnIdx);
            if (btnsIdx) btnsIdx.split(',').forEach(apply);

            keys.forEach(k => sendKey(k, isPressed ? 'keydown' : 'keyup'));

            if (isPressed) {
                el.classList.add('active');
                if (el.classList.contains('zone')) {
                    const hat = document.querySelector('.dpad-hat');
                    if (el.classList.contains('z-u')) hat.style.transform = 'translate(-50%, -58%) rotateX(10deg)';
                    if (el.classList.contains('z-d')) hat.style.transform = 'translate(-50%, -42%) rotateX(-10deg)';
                    if (el.classList.contains('z-l')) hat.style.transform = 'translate(-58%, -50%) rotateY(-10deg)';
                    if (el.classList.contains('z-r')) hat.style.transform = 'translate(-42%, -50%) rotateY(10deg)';
                }
            } else {
                el.classList.remove('active');
                if (el.classList.contains('zone')) {
                    document.querySelector('.dpad-hat').style.transform = 'translate(-50%, -50%)';
                }
            }
            virtualGamepad.timestamp = performance.now();
        }

        const allButtons = document.querySelectorAll('[data-btn], [data-btns]');
        allButtons.forEach(btn => {
            const press = (e) => { e.preventDefault(); handleInput(btn, true); };
            const release = (e) => { e.preventDefault(); handleInput(btn, false); };
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('mousedown', press);
        });

        window.addEventListener('mouseup', () => allButtons.forEach(btn => handleInput(btn, false)));

        window.onload = () => {
            urlInput.value = localStorage.getItem('vb_url_v4') || '';
            const savedMode = localStorage.getItem('vb_mode_v4') || 'fit';
            setMode(savedMode);
            saveSettings();
            
            // Connection trigger on interaction
            const init = () => {
                triggerConnection();
                document.body.removeEventListener('touchstart', init);
                document.body.removeEventListener('mousedown', init);
            };
            document.body.addEventListener('touchstart', init);
            document.body.addEventListener('mousedown', init);
        };
    </script>
</body>
</html>
