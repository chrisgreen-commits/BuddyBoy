<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebHandheld Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --body-color: #1c1c1e;
            --screen-bg: #000;
            --button-color: #2c2c2e;
            --accent-color: #3a3a3c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none;
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--body-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Screen Section: Clean container with no forced cropping */
        .screen-section {
            width: 100%;
            flex: 0 0 60%; 
            background: #000;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            /* Removes all previous cropping/scaling logic */
            object-fit: contain; 
        }

        /* Controls Section: Exactly 40% */
        .controls-section {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            padding: 10px 20px env(safe-area-inset-bottom);
            justify-content: space-around;
            background: linear-gradient(to bottom, #2c2c2e, #1c1c1e);
            border-top: 1px solid #3a3a3c;
            position: relative;
        }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Faceted D-Pad */
        .dpad-wrapper {
            position: relative;
            width: clamp(120px, 35vw, 160px);
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 2px 10px rgba(0,0,0,1);
        }

        .dpad-hat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            border-radius: 50%;
            background: #2c2c2e;
            background: conic-gradient(from 0deg, #3a3a3c, #1a1a1c 45deg, #2c2c2e 90deg, #111 135deg, #3a3a3c 180deg, #1a1a1c 225deg, #2c2c2e 270deg, #111 315deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 5;
            transition: transform 0.1s ease-out;
        }

        .zone { position: absolute; z-index: 20; opacity: 0; }
        .z-u  { width: 40%; height: 35%; top: 0; left: 30%; }
        .z-d  { width: 40%; height: 35%; bottom: 0; left: 30%; }
        .z-l  { width: 35%; height: 40%; left: 0; top: 30%; }
        .z-r  { width: 35%; height: 40%; right: 0; top: 30%; }
        .z-ul { width: 30%; height: 30%; top: 0; left: 0; }
        .z-ur { width: 30%; height: 30%; top: 0; right: 0; }
        .z-dl { width: 30%; height: 30%; bottom: 0; left: 0; }
        .z-dr { width: 30%; height: 30%; bottom: 0; right: 0; }

        /* Classic ABXY Cluster */
        .action-cluster {
            display: grid;
            grid-template-areas: ". y ." "x . b" ". a .";
            gap: 12px;
            width: clamp(120px, 35vw, 160px);
            aspect-ratio: 1/1;
        }
        .btn-a { grid-area: a; }
        .btn-b { grid-area: b; }
        .btn-x { grid-area: x; }
        .btn-y { grid-area: y; }

        .btn {
            width: 100%; height: 100%; background: #2c2c2e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; box-shadow: 0 5px 0 #000;
            font-size: 1.2rem;
            border: 1px solid #3a3a3c;
        }

        .active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
            filter: brightness(1.4);
        }

        .shoulder-row { display: flex; justify-content: space-between; width: 100%; }
        .shoulder-btn {
            width: 35%; height: 40px; background: #2c2c2e; border-radius: 10px; border: 1px solid #3a3a3c;
            color: #8e8e93; font-weight: bold; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 3px 0 #000;
        }

        .menu-row { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .menu-btn { width: 45px; height: 12px; background: #111; border-radius: 6px; border-bottom: 2px solid #444; }
        
        .turbo-btn {
            width: 55px; height: 55px; background: #2c2c2e; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid #3a3a3c; color: #ef4444; font-size: 0.65rem; font-weight: 900;
            box-shadow: 0 3px 0 #000; transition: all 0.2s ease;
        }
        .turbo-btn.active-turbo { 
            background: #ef4444; color: #fff; border-color: #fca5a5;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.7);
            transform: scale(1.05);
        }

        #settings-overlay {
            position: absolute; inset: 0; background: rgba(10, 10, 12, 0.98);
            z-index: 100; display: none; flex-direction: column; padding: 40px 24px; color: white;
            user-select: text !important; -webkit-user-select: text !important; touch-action: auto !important;
        }

        .gear-icon {
            position: absolute; top: 15px; right: 15px; z-index: 50; color: #ffffff;
            background: rgba(0,0,0,0.6); border-radius: 50%; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; backdrop-filter: blur(8px);
        }

        input { background: #2c2c2e; color: white; border: 1px solid #444; padding: 16px; border-radius: 12px; width: 100%; font-size: 1rem; }
        .paste-btn { background: #444; padding: 0 20px; border-radius: 12px; color: #fff; }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="gear-icon" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <div id="settings-overlay">
            <h2 class="text-2xl font-bold mb-8">System Settings</h2>
            <div class="mb-6">
                <label class="text-xs text-zinc-500 uppercase tracking-widest font-bold">Game Source</label>
                <div class="flex gap-3 mt-2">
                    <input type="text" id="url-input" placeholder="https://..." autocomplete="off">
                    <button onclick="pasteFromClipboard()" class="paste-btn"><i class="fas fa-paste"></i></button>
                </div>
            </div>
            <button onclick="saveSettings()" class="bg-blue-600 py-5 rounded-2xl font-black text-xl mt-4 active:scale-95 transition-transform">INITIALIZE GAME</button>
            <button onclick="toggleSettings()" class="text-zinc-500 py-4 mt-4 font-bold">CANCEL</button>
        </div>

        <div class="screen-section">
            <iframe id="game-iframe" src="about:blank" scrolling="no" allow="autoplay; gamepad"></iframe>
        </div>

        <div class="controls-section">
            <div class="shoulder-row">
                <div class="shoulder-btn" data-btn="4" data-keys="q">L</div>
                <div class="shoulder-btn" data-btn="5" data-keys="e">R</div>
            </div>

            <div class="main-controls">
                <div class="dpad-wrapper">
                    <div class="dpad-hat"></div>
                    <div class="zone z-u" data-btn="12" data-keys="ArrowUp,w" data-tilt="up"></div>
                    <div class="zone z-d" data-btn="13" data-keys="ArrowDown,s" data-tilt="down"></div>
                    <div class="zone z-l" data-btn="14" data-keys="ArrowLeft,a" data-tilt="left"></div>
                    <div class="zone z-r" data-btn="15" data-keys="ArrowRight,d" data-tilt="right"></div>
                    <div class="zone z-ul" data-btns="12,14" data-keys="ArrowUp,ArrowLeft,w,a" data-tilt="up-left"></div>
                    <div class="zone z-ur" data-btns="12,15" data-keys="ArrowUp,ArrowRight,w,d" data-tilt="up-right"></div>
                    <div class="zone z-dl" data-btns="13,14" data-keys="ArrowDown,ArrowLeft,s,a" data-tilt="down-left"></div>
                    <div class="zone z-dr" data-btns="13,15" data-keys="ArrowDown,ArrowRight,s,d" data-tilt="down-right"></div>
                </div>

                <div class="action-cluster">
                    <div class="btn btn-y" data-btn="3" data-keys="i">Y</div>
                    <div class="btn btn-x" data-btn="2" data-keys="j">X</div>
                    <div class="btn btn-b" data-btn="1" data-keys="Escape,Shift">B</div>
                    <div class="btn btn-a" data-btn="0" data-keys="Enter, ">A</div>
                </div>
            </div>

            <div class="menu-row">
                <div class="menu-btn" data-btn="8" data-keys="Tab"></div>
                <button class="turbo-btn" onclick="toggleTurbo()">
                    <span class="tracking-tighter">TURBO</span>
                    <span id="turbo-display" class="text-xs">OFF</span>
                </button>
                <div class="menu-btn" data-btn="9" data-keys="p"></div>
            </div>
        </div>
    </div>

    <script>
        const virtualGamepad = {
            id: "Handheld Virtual Controller",
            index: 0, connected: true, timestamp: performance.now(), mapping: "standard",
            axes: [0, 0, 0, 0],
            buttons: Array(17).fill(0).map(() => ({ pressed: false, touched: false, value: 0 }))
        };

        navigator.getGamepads = () => [virtualGamepad, null, null, null];

        let turboLevel = 0; 
        let lastTap = { key: null, time: 0 };

        function triggerConnection() {
            try {
                const event = new Event('gamepadconnected');
                Object.defineProperty(event, 'gamepad', { value: virtualGamepad, enumerable: true });
                window.dispatchEvent(event);
            } catch (e) {}
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) document.getElementById('url-input').value = text;
            } catch (err) { document.getElementById('url-input').focus(); }
        }

        function toggleTurbo() {
            turboLevel = (turboLevel + 1) % 3;
            const display = document.getElementById('turbo-display');
            const btn = document.querySelector('.turbo-btn');
            const speeds = ['OFF', '2X', '4X'];
            display.innerText = speeds[turboLevel];
            turboLevel > 0 ? btn.classList.add('active-turbo') : btn.classList.remove('active-turbo');
        }

        function turboPump() {
            if (turboLevel > 0) {
                const multi = turboLevel * 2;
                const iframe = document.getElementById('game-iframe');
                if (iframe.contentWindow) {
                    for(let i=0; i<multi; i++) {
                        iframe.contentWindow.postMessage({ type: 'gamepad-update', state: virtualGamepad }, "*");
                        iframe.contentWindow.postMessage({ type: 'turbo-tick' }, "*");
                    }
                }
            }
            requestAnimationFrame(turboPump);
        }
        turboPump();

        function sendKey(key, type) {
            const iframe = document.getElementById('game-iframe');
            if (!iframe.contentWindow) return;
            try {
                iframe.contentWindow.postMessage({ type: 'keyboard-bridge', keyAction: type, key: key }, "*");
            } catch (err) {}
        }

        function handleInput(el, isPressed) {
            if (document.getElementById('settings-overlay').style.display === 'flex') return;
            
            const btnIdx = el.getAttribute('data-btn');
            const btnsIdx = el.getAttribute('data-btns');
            const tiltMode = el.getAttribute('data-tilt');
            const keys = el.getAttribute('data-keys')?.split(',') || [];

            if (isPressed && (tiltMode === 'left' || tiltMode === 'right')) {
                const now = performance.now();
                if (lastTap.key === tiltMode && now - lastTap.time < 300) {
                    sendKey(keys[0], 'keyup');
                    setTimeout(() => sendKey(keys[0], 'keydown'), 15);
                }
                lastTap = { key: tiltMode, time: now };
            }

            const apply = (idx) => {
                const i = parseInt(idx);
                virtualGamepad.buttons[i].pressed = isPressed;
                virtualGamepad.buttons[i].value = isPressed ? 1 : 0;
            };

            if (btnIdx) apply(btnIdx);
            if (btnsIdx) btnsIdx.split(',').forEach(apply);
            keys.forEach(k => sendKey(k, isPressed ? 'keydown' : 'keyup'));

            if (isPressed) {
                el.classList.add('active');
                if (tiltMode) {
                    const hat = document.querySelector('.dpad-hat');
                    let tx = -50, ty = -50, rx = 0, ry = 0;
                    if (tiltMode.includes('up')) { ty = -56; rx = 12; }
                    if (tiltMode.includes('down')) { ty = -44; rx = -12; }
                    if (tiltMode.includes('left')) { tx = -56; ry = -12; }
                    if (tiltMode.includes('right')) { tx = -44; ry = 12; }
                    hat.style.transform = `translate(${tx}%, ${ty}%) rotateX(${rx}deg) rotateY(${ry}deg) scale(0.98)`;
                }
            } else {
                el.classList.remove('active');
                if (tiltMode) document.querySelector('.dpad-hat').style.transform = 'translate(-50%, -50%)';
            }
            virtualGamepad.timestamp = performance.now();
        }

        function toggleSettings() {
            const ov = document.getElementById('settings-overlay');
            ov.style.display = ov.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveSettings() {
            const url = document.getElementById('url-input').value || 'https://www.google.com/logos/2010/pacman10-i.html';
            document.getElementById('game-iframe').src = url;
            localStorage.setItem('vb_url_v9', url);
            toggleSettings();
            setTimeout(triggerConnection, 1200);
        }

        const allButtons = document.querySelectorAll('[data-btn], [data-btns]');
        allButtons.forEach(btn => {
            const press = (e) => { e.preventDefault(); e.stopPropagation(); handleInput(btn, true); };
            const release = (e) => { e.preventDefault(); e.stopPropagation(); handleInput(btn, false); };
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('mousedown', press);
        });

        window.addEventListener('mouseup', () => allButtons.forEach(btn => handleInput(btn, false)));

        window.onload = () => {
            document.getElementById('url-input').value = localStorage.getItem('vb_url_v9') || '';
            saveSettings();
            const init = () => { triggerConnection(); document.body.removeEventListener('touchstart', init); };
            document.body.addEventListener('touchstart', init);
        };
    </script>
</body>
</html>
