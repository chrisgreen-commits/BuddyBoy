<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebHandheld Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --body-color: #1c1c1e;
            --screen-bg: #000;
            --button-color: #2c2c2e;
            --accent-color: #3a3a3c;
        }

        /* Prevent all selection and system gestures */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none;
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--body-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Screen Section - Exactly 60% HEIGHT */
        .screen-section {
            width: 100%;
            flex: 0 0 60%; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #game-iframe {
            border: none;
            background: #000;
            width: 100%;
            height: 100%;
            /* Fixed Full Crop centered behavior */
            object-fit: cover;
            transform: scale(1.02); /* Slight scale to hide potential scrollbars/edges */
            pointer-events: auto;
        }

        /* Controls Section - Exactly 40% HEIGHT */
        .controls-section {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            padding: 10px 20px env(safe-area-inset-bottom);
            justify-content: space-around;
            background: linear-gradient(to bottom, #2c2c2e, #1c1c1e);
            border-top: 1px solid #3a3a3c;
            position: relative;
        }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* D-Pad with 8-way Visual Feedback */
        .dpad-wrapper {
            position: relative;
            width: clamp(110px, 32vw, 150px);
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
            perspective: 500px;
        }

        .dpad-hat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            background: radial-gradient(circle at 30% 30%, #444, #18181b);
            border-radius: 50%;
            clip-path: polygon(33% 0%, 67% 0%, 67% 33%, 100% 33%, 100% 67%, 67% 67%, 67% 100%, 33% 100%, 33% 67%, 0% 67%, 0% 33%, 33% 33%);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 5;
        }

        .zone { position: absolute; z-index: 20; }
        .z-u  { width: 40%; height: 35%; top: 0; left: 30%; }
        .z-d  { width: 40%; height: 35%; bottom: 0; left: 30%; }
        .z-l  { width: 35%; height: 40%; left: 0; top: 30%; }
        .z-r  { width: 35%; height: 40%; right: 0; top: 30%; }
        .z-ul { width: 30%; height: 30%; top: 0; left: 0; }
        .z-ur { width: 30%; height: 30%; top: 0; right: 0; }
        .z-dl { width: 30%; height: 30%; bottom: 0; left: 0; }
        .z-dr { width: 30%; height: 30%; bottom: 0; right: 0; }

        .action-cluster {
            display: grid;
            grid-template-areas: ". y ." "x . b" ". a .";
            gap: 8px;
            width: clamp(110px, 32vw, 150px);
            aspect-ratio: 1/1;
        }

        .btn {
            width: 100%; height: 100%; background: #2c2c2e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; box-shadow: 0 4px 0 #000;
        }

        .active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
            filter: brightness(1.3);
        }

        .shoulder-row { display: flex; justify-content: space-between; width: 100%; }
        .shoulder-btn {
            width: 32%; height: 36px; background: #1c1c1e; border-radius: 8px; border: 1px solid #3a3a3c;
            color: #8e8e93; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
        }

        .menu-row { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .menu-btn { width: 40px; height: 10px; background: #111; border-radius: 5px; border-bottom: 2px solid #444; }
        
        /* Turbo Button Styles */
        .turbo-btn {
            width: 44px;
            height: 44px;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #3a3a3c;
            color: #ef4444;
            font-size: 0.6rem;
            font-weight: 800;
            box-shadow: 0 2px 0 #000;
            transition: all 0.2s ease;
        }
        .turbo-btn.active-turbo {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            border-color: #f87171;
        }
        .turbo-val { font-size: 0.8rem; line-height: 1; }

        /* SETTINGS OVERLAY */
        #settings-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 12, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 30px 24px;
            color: white;
            overflow-y: auto;
            user-select: text !important;
            -webkit-user-select: text !important;
            touch-action: auto !important;
        }

        .gear-icon {
            position: absolute; top: 15px; right: 15px; z-index: 50; color: #ffffff;
            background: rgba(0,0,0,0.5); border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            backdrop-filter: blur(8px);
        }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #8e8e93; margin-bottom: 6px; }
        
        .url-input-container { display: flex; gap: 8px; }

        input { 
            background: #2c2c2e; color: white; border: 1px solid #3a3a3c; padding: 12px; 
            border-radius: 8px; width: 100%; user-select: text !important;
        }

        .paste-btn { background: #3a3a3c; padding: 0 15px; border-radius: 8px; color: #fff; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="gear-icon" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <div id="settings-overlay">
            <h2 class="text-xl font-bold mb-6">Console Settings</h2>
            
            <div class="input-group">
                <label>Game Source URL</label>
                <div class="url-input-container">
                    <input type="text" id="url-input" placeholder="https://game-site.com" autocomplete="off">
                    <button onclick="pasteFromClipboard()" class="paste-btn">
                        <i class="fas fa-paste"></i>
                    </button>
                </div>
            </div>

            <div class="mt-2 flex flex-col gap-3">
                <button onclick="saveSettings()" class="bg-blue-600 py-4 rounded-xl font-bold text-lg">Apply & Restart</button>
                <button onclick="toggleSettings()" class="text-zinc-500 py-2">Back to Game</button>
            </div>
        </div>

        <div class="screen-section">
            <iframe id="game-iframe" src="about:blank" scrolling="no" allow="autoplay; gamepad"></iframe>
        </div>

        <div class="controls-section">
            <div class="shoulder-row">
                <div class="shoulder-btn" data-btn="4" data-keys="q">L</div>
                <div class="shoulder-btn" data-btn="5" data-keys="e">R</div>
            </div>

            <div class="main-controls">
                <div class="dpad-wrapper">
                    <div class="dpad-hat"></div>
                    <div class="zone z-u" data-btn="12" data-keys="ArrowUp,w" data-tilt="up"></div>
                    <div class="zone z-d" data-btn="13" data-keys="ArrowDown,s" data-tilt="down"></div>
                    <div class="zone z-l" data-btn="14" data-keys="ArrowLeft,a" data-tilt="left"></div>
                    <div class="zone z-r" data-btn="15" data-keys="ArrowRight,d" data-tilt="right"></div>
                    <div class="zone z-ul" data-btns="12,14" data-keys="ArrowUp,ArrowLeft,w,a" data-tilt="up-left"></div>
                    <div class="zone z-ur" data-btns="12,15" data-keys="ArrowUp,ArrowRight,w,d" data-tilt="up-right"></div>
                    <div class="zone z-dl" data-btns="13,14" data-keys="ArrowDown,ArrowLeft,s,a" data-tilt="down-left"></div>
                    <div class="zone z-dr" data-btns="13,15" data-keys="ArrowDown,ArrowRight,s,d" data-tilt="down-right"></div>
                </div>

                <div class="action-cluster">
                    <div class="btn btn-y" data-btn="3" data-keys="i">Y</div>
                    <div class="btn btn-x" data-btn="2" data-keys="j">X</div>
                    <div class="btn btn-b" data-btn="1" data-keys="Escape,Shift">B</div>
                    <div class="btn btn-a" data-btn="0" data-keys="Enter, ">A</div>
                </div>
            </div>

            <div class="menu-row">
                <div class="menu-btn" data-btn="8" data-keys="Tab"></div>
                <button class="turbo-btn" onclick="toggleTurbo()">
                    <span>TURBO</span>
                    <span class="turbo-val" id="turbo-display">OFF</span>
                </button>
                <div class="menu-btn" data-btn="9" data-keys="p"></div>
            </div>
        </div>
    </div>

    <script>
        const virtualGamepad = {
            id: "Handheld Virtual Controller",
            index: 0, connected: true, timestamp: performance.now(), mapping: "standard",
            axes: [0, 0, 0, 0],
            buttons: Array(17).fill(0).map(() => ({ pressed: false, touched: false, value: 0 }))
        };

        navigator.getGamepads = () => [virtualGamepad, null, null, null];

        let turboLevel = 0; // 0, 2, 4
        let turboInterval = null;

        function triggerConnection() {
            try {
                const event = new Event('gamepadconnected');
                Object.defineProperty(event, 'gamepad', { value: virtualGamepad, enumerable: true });
                window.dispatchEvent(event);
            } catch (e) {}
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) document.getElementById('url-input').value = text;
            } catch (err) {
                document.getElementById('url-input').focus();
            }
        }

        function toggleTurbo() {
            const display = document.getElementById('turbo-display');
            const btn = document.querySelector('.turbo-btn');
            
            if (turboLevel === 0) turboLevel = 2;
            else if (turboLevel === 2) turboLevel = 4;
            else turboLevel = 0;

            if (turboLevel > 0) {
                display.innerText = turboLevel + 'X';
                btn.classList.add('active-turbo');
                startTurboLoop();
            } else {
                display.innerText = 'OFF';
                btn.classList.remove('active-turbo');
                stopTurboLoop();
            }
        }

        function startTurboLoop() {
            stopTurboLoop();
            // Turbo works by rapid-firing interaction events that often force browser loops to wake up
            // or by triggering emulators that listen for high frequency pulses.
            turboInterval = setInterval(() => {
                const iframe = document.getElementById('game-iframe');
                if (iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'turbo-pulse' }, "*");
                    // Also fire a dummy empty event to keep the process priority high
                    iframe.focus();
                }
            }, 1000 / (60 * turboLevel));
        }

        function stopTurboLoop() {
            if (turboInterval) clearInterval(turboInterval);
        }

        function sendKey(key, type) {
            const iframe = document.getElementById('game-iframe');
            if (!iframe.contentWindow) return;
            iframe.focus();
            try {
                iframe.contentWindow.postMessage({ type: 'keyboard-bridge', keyAction: type, key: key }, "*");
                if (iframe.contentWindow.dispatchEvent) {
                    const kbEvent = new KeyboardEvent(type, {
                        key: key,
                        code: key.length === 1 ? `Key${key.toUpperCase()}` : key,
                        bubbles: true, cancelable: true
                    });
                    iframe.contentWindow.dispatchEvent(kbEvent);
                }
            } catch (err) {}
        }

        const iframe = document.getElementById('game-iframe');
        const overlay = document.getElementById('settings-overlay');
        const urlInput = document.getElementById('url-input');

        function toggleSettings() {
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveSettings() {
            const url = urlInput.value || 'https://www.google.com/logos/2010/pacman10-i.html';
            iframe.src = url;
            localStorage.setItem('vb_url_v6', url);
            toggleSettings();
            setTimeout(triggerConnection, 1000);
        }

        function handleInput(el, isPressed) {
            if (overlay.style.display === 'flex') return;
            
            const btnIdx = el.getAttribute('data-btn');
            const btnsIdx = el.getAttribute('data-btns');
            const tiltMode = el.getAttribute('data-tilt');
            const keys = el.getAttribute('data-keys')?.split(',') || [];

            const apply = (idx) => {
                const i = parseInt(idx);
                virtualGamepad.buttons[i].pressed = isPressed;
                virtualGamepad.buttons[i].value = isPressed ? 1 : 0;
            };

            if (btnIdx) apply(btnIdx);
            if (btnsIdx) btnsIdx.split(',').forEach(apply);

            keys.forEach(k => sendKey(k, isPressed ? 'keydown' : 'keyup'));

            if (isPressed) {
                el.classList.add('active');
                if (tiltMode) {
                    const hat = document.querySelector('.dpad-hat');
                    let tx = -50, ty = -50, rx = 0, ry = 0;
                    if (tiltMode.includes('up')) { ty = -58; rx = 10; }
                    if (tiltMode.includes('down')) { ty = -42; rx = -10; }
                    if (tiltMode.includes('left')) { tx = -58; ry = -10; }
                    if (tiltMode.includes('right')) { tx = -42; ry = 10; }
                    hat.style.transform = `translate(${tx}%, ${ty}%) rotateX(${rx}deg) rotateY(${ry}deg)`;
                }
            } else {
                el.classList.remove('active');
                if (tiltMode) {
                    document.querySelector('.dpad-hat').style.transform = 'translate(-50%, -50%)';
                }
            }
            virtualGamepad.timestamp = performance.now();
        }

        const allButtons = document.querySelectorAll('[data-btn], [data-btns]');
        allButtons.forEach(btn => {
            const press = (e) => { 
                e.preventDefault(); 
                e.stopPropagation();
                handleInput(btn, true); 
            };
            const release = (e) => { 
                e.preventDefault(); 
                e.stopPropagation();
                handleInput(btn, false); 
            };
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('mousedown', press);
        });

        window.addEventListener('mouseup', () => allButtons.forEach(btn => handleInput(btn, false)));

        window.onload = () => {
            urlInput.value = localStorage.getItem('vb_url_v6') || '';
            saveSettings();
            
            const init = () => {
                triggerConnection();
                document.body.removeEventListener('touchstart', init);
                document.body.removeEventListener('mousedown', init);
            };
            document.body.addEventListener('touchstart', init);
            document.body.addEventListener('mousedown', init);
        };
    </script>
</body>
</html>
