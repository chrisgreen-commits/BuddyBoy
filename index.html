<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebHandheld Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --body-color: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #000; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            user-select: none; touch-action: none;
        }
        .viewport-wrapper {
            position: relative;
            width: min(100vw, calc(100vh * 9 / 16), 500px);
            aspect-ratio: 9 / 16;
            background: var(--body-color);
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        /* Screen */
        .screen-section {
            width: 100%; flex: 0 0 60%;
            background: #000; position: relative;
            overflow: hidden; z-index: 10;
        }
        #game-iframe {
            position: absolute; top: 0; left: 0;
            border: none; background: #000; transform-origin: top left;
        }
        /* Controls */
        .controls-section {
            flex: 1; display: flex; flex-direction: column;
            padding: 14px; justify-content: space-between;
            background: linear-gradient(to bottom, #2c2c2e, #1c1c1e);
            border-top: 1px solid #3a3a3c; position: relative;
        }
        .main-controls {
            display: flex; justify-content: space-between;
            align-items: center; width: 100%; margin-top: 8px;
        }
        /* Joystick */
        .joystick-base {
            position: relative; width: 128px; height: 128px;
            background: radial-gradient(circle at 38% 32%, #1e1e20, #0d0d0f);
            border-radius: 50%;
            box-shadow: inset 0 3px 12px rgba(0,0,0,0.9), inset 0 -1px 3px rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.6);
            touch-action: none; flex-shrink: 0; cursor: pointer;
        }
        /* Subtle ring when active */
        .joystick-base::after {
            content: ''; position: absolute; inset: 6px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0); transition: border-color 0.1s;
        }
        .joystick-base.active::after { border-color: rgba(255,255,255,0.08); }
        /* Guide cross — faint lines to indicate 8 directions */
        .joystick-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            pointer-events: none; opacity: 0.06;
        }
        .joystick-nub {
            position: absolute; width: 52px; height: 52px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 36% 30%, #5a5a5e, #212124);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.07) inset;
            pointer-events: none;
            /* No transition — nub follows finger in real time */
        }
        /* Action buttons */
        .action-cluster {
            display: grid; grid-template-areas: ". y ." "x . b" ". a .";
            gap: 9px; width: 130px; height: 130px; flex-shrink: 0;
        }
        .btn {
            width: 42px; height: 42px; background: #2c2c2e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; box-shadow: 0 4px 0 #000;
            font-size: 1rem; touch-action: none; cursor: pointer;
        }
        .btn-y { grid-area: y; border: 1px solid #facc1555; }
        .btn-x { grid-area: x; border: 1px solid #60a5fa55; }
        .btn-b { grid-area: b; border: 1px solid #f8717155; }
        .btn-a { grid-area: a; border: 1px solid #4ade8055; }
        .active { transform: translateY(3px); box-shadow: 0 1px 0 #000; filter: brightness(1.4); }
        /* Shoulder */
        .shoulder-row { display: flex; justify-content: space-between; width: 100%; }
        .shoulder-btn {
            width: 40%; height: 33px; background: #1c1c1e; border-radius: 8px;
            border: 1px solid #3a3a3c; color: #8e8e93; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; touch-action: none; cursor: pointer;
        }
        /* Menu */
        .menu-row { display: flex; justify-content: center; gap: 28px; padding-bottom: 4px; }
        .menu-btn {
            width: 38px; height: 10px; background: #111;
            border-radius: 5px; border-bottom: 2px solid #444;
            touch-action: none; cursor: pointer;
        }
        /* Gear */
        .gear-icon {
            position: absolute; top: 14px; right: 14px; z-index: 50;
            color: #8e8e93; font-size: 1.1rem; padding: 10px; cursor: pointer;
        }
        /* ── Settings overlay ── */
        #settings-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.97);
            z-index: 100; display: none; flex-direction: column;
            color: white; overflow: hidden;
        }
        .settings-tabs {
            display: flex; gap: 2px; padding: 14px 14px 0; flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 9px 0; border-radius: 8px;
            font-weight: bold; font-size: 0.78rem;
            background: transparent; color: #52525b;
            border: none; cursor: pointer; transition: all 0.15s;
        }
        .tab-btn.active { background: #27272a; color: white; }
        .tab-panel {
            flex: 1; overflow-y: auto; padding: 14px 14px 0;
            display: none; flex-direction: column;
        }
        .tab-panel.active { display: flex; }
        .field-label {
            font-size: 0.62rem; text-transform: uppercase;
            color: #71717a; margin-bottom: 4px; display: block; letter-spacing: 0.05em;
        }
        .text-input {
            background: #27272a; color: white; border: 1px solid #3f3f46;
            padding: 10px 12px; border-radius: 8px; width: 100%;
            margin-bottom: 12px; font-size: 0.83rem;
        }
        .text-input:focus { outline: none; border-color: #3b82f6; }
        .toggle-group { display: flex; gap: 6px; margin-bottom: 12px; }
        .toggle-btn {
            flex: 1; padding: 8px 0; border-radius: 8px;
            font-weight: bold; font-size: 0.73rem;
            background: #27272a; color: #71717a;
            border: none; cursor: pointer;
        }
        .toggle-btn.active { background: #2563eb; color: white; }
        .info-box {
            background: #27272a; border-radius: 8px; padding: 11px;
            margin-bottom: 12px; font-size: 0.72rem; color: #71717a; line-height: 1.55;
        }
        .save-row {
            display: flex; align-items: center; gap: 9px;
            margin-bottom: 14px; margin-top: -6px;
        }
        .save-row input[type=checkbox] {
            width: 15px; height: 15px; accent-color: #2563eb;
            cursor: pointer; flex-shrink: 0; margin: 0;
        }
        .save-row label { font-size: 0.78rem; color: #a1a1aa; cursor: pointer; }
        .settings-footer {
            padding: 10px 14px 18px; flex-shrink: 0;
            display: flex; flex-direction: column; gap: 6px;
        }
        .btn-primary {
            background: #2563eb; padding: 13px; border-radius: 11px;
            font-weight: bold; font-size: 0.87rem; border: none;
            color: white; cursor: pointer; width: 100%;
        }
        .btn-ghost {
            background: transparent; padding: 7px;
            color: #71717a; font-size: 0.82rem; border: none; cursor: pointer;
        }
        /* ── Cartridge Library ── */
        #cartridge-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding-bottom: 20px;
        }
        .cart-empty {
            grid-column: 1/-1; text-align: center;
            color: #52525b; font-size: 0.82rem; padding: 40px 0; line-height: 1.9;
        }
        .cart-card {
            background: #27272a; border-radius: 10px;
            border: 1px solid #3f3f46; overflow: hidden; display: flex; flex-direction: column;
        }
        .cart-art {
            height: 78px; position: relative;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #3f3f46, #18181b); overflow: hidden;
        }
        .cart-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .cart-initial {
            font-size: 1.9rem; font-weight: 900;
            color: rgba(255,255,255,0.11); position: relative; z-index: 1;
        }
        .cart-notch {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 38%; height: 7px; background: #18181b; border-radius: 4px 4px 0 0; z-index: 2;
        }
        .cart-body { padding: 8px; }
        .cart-name {
            font-size: 0.73rem; font-weight: bold; color: white;
            margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .cart-host {
            font-size: 0.59rem; color: #71717a; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
        }
        .cart-actions { display: flex; gap: 4px; }
        .cart-play {
            flex: 1; background: #2563eb; color: white; border: none;
            border-radius: 6px; padding: 5px 0; font-size: 0.63rem; font-weight: bold; cursor: pointer;
        }
        .cart-edit, .cart-del {
            background: #3f3f46; border: none; border-radius: 6px;
            padding: 5px 7px; font-size: 0.63rem; cursor: pointer;
        }
        .cart-edit { color: #a1a1aa; }
        .cart-del  { color: #f87171; }
        /* Cart editor */
        #cart-editor {
            position: absolute; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 200; display: none; flex-direction: column;
            padding: 18px 16px; color: white; overflow-y: auto;
        }
        #cart-editor h3 { font-size: 0.95rem; font-weight: bold; margin-bottom: 14px; }
        .key-grid {
            display: grid; grid-template-columns: 28px 1fr;
            gap: 6px 8px; align-items: center; margin-bottom: 10px;
        }
        .key-label { font-size: 0.72rem; font-weight: bold; color: #a1a1aa; text-align: right; }
        .key-hint { font-size: 0.6rem; color: #52525b; grid-column: 1/-1; margin-top: -3px; margin-bottom: 2px; }
    </style>
</head>
<body>
<div class="viewport-wrapper">
    <div class="gear-icon" onclick="toggleSettings()"><i class="fas fa-cog"></i></div>

    <!-- ══ SETTINGS OVERLAY ══ -->
    <div id="settings-overlay">
        <div class="settings-tabs">
            <button class="tab-btn active" id="tab-btn-settings" onclick="showTab('settings')">
                <i class="fas fa-sliders-h" style="margin-right:4px"></i>Settings
            </button>
            <button class="tab-btn" id="tab-btn-library" onclick="showTab('library')">
                <i class="fas fa-th-large" style="margin-right:4px"></i>My Games
            </button>
        </div>

        <!-- Settings panel -->
        <div class="tab-panel active" id="tab-settings">
            <label class="field-label">Game URL</label>
            <input class="text-input" type="text" id="url-input" placeholder="Paste game URL here…">
            <div style="display:flex;gap:6px;margin-bottom:14px;margin-top:-6px">
                <button class="toggle-btn" style="flex:0 0 auto;padding:7px 14px;background:#16a34a;color:white" onclick="saveUrlToLibrary()">
                    <i class="fas fa-bookmark" style="margin-right:5px"></i>Save to My Games
                </button>
            </div>

            <label class="field-label">View Mode</label>
            <div class="toggle-group">
                <button class="toggle-btn" id="mode-btn-original" onclick="setMode('original')">Original</button>
                <button class="toggle-btn" id="mode-btn-crop"     onclick="setMode('crop')">Crop</button>
            </div>

            <label class="field-label">Game Aspect Ratio</label>
            <div class="toggle-group">
                <button class="toggle-btn" id="ar-btn-169" onclick="setAspectRatio(16,9)">16:9</button>
                <button class="toggle-btn" id="ar-btn-43"  onclick="setAspectRatio(4,3)">4:3</button>
            </div>

            <label class="field-label">Performance</label>
            <div class="toggle-group" style="margin-bottom:4px">
                <button class="toggle-btn" id="speed-fix-btn" onclick="toggleSpeedFix()">Speed Fix: OFF</button>
            </div>
            <p style="font-size:0.65rem;color:#52525b;margin-bottom:12px">Enable if game runs in slow motion.</p>

            <div class="info-box">
                <strong style="color:#a1a1aa">Controls:</strong><br>
                D-Pad = Arrow Keys / WASD &nbsp;·&nbsp; A = Space/Enter<br>
                B = Esc/Shift &nbsp;·&nbsp; X = Z &nbsp;·&nbsp; Y = X<br>
                <em style="color:#52525b">Key bindings are customizable per saved game.</em>
            </div>
        </div>

        <!-- Library panel -->
        <div class="tab-panel" id="tab-library">
            <div id="cartridge-grid"></div>
        </div>

        <!-- Footer -->
        <div class="settings-footer" id="settings-footer">
            <button class="btn-primary" onclick="saveSettings()">
                <i class="fas fa-gamepad" style="margin-right:6px"></i>Launch Game
            </button>
            <button class="btn-ghost" onclick="toggleSettings()">Cancel</button>
        </div>

        <!-- Cartridge editor (layered inside overlay) -->
        <div id="cart-editor">
            <h3><i class="fas fa-edit" style="margin-right:6px"></i>Edit Cartridge</h3>

            <label class="field-label">Name</label>
            <input class="text-input" id="edit-name" placeholder="Game name">

            <label class="field-label">Artwork URL <span style="font-size:0.6rem;text-transform:none;color:#52525b">(any image URL)</span></label>
            <input class="text-input" id="edit-art" placeholder="https://…">

            <label class="field-label">Button Key Bindings
                <span style="font-size:0.6rem;text-transform:none;color:#52525b"> — comma-separated</span>
            </label>
            <div class="key-grid">
                <span class="key-label" style="color:#4ade80">A</span>
                <input class="text-input key-input" id="edit-key-a" placeholder="Enter,Space" style="margin-bottom:0">
                <span class="key-label" style="color:#f87171">B</span>
                <input class="text-input key-input" id="edit-key-b" placeholder="Escape,Shift" style="margin-bottom:0">
                <span class="key-label" style="color:#60a5fa">X</span>
                <input class="text-input key-input" id="edit-key-x" placeholder="z" style="margin-bottom:0">
                <span class="key-label" style="color:#facc15">Y</span>
                <input class="text-input key-input" id="edit-key-y" placeholder="x" style="margin-bottom:0">
                <span class="key-label" style="color:#d4d4d8">L</span>
                <input class="text-input key-input" id="edit-key-l" placeholder="q" style="margin-bottom:0">
                <span class="key-label" style="color:#d4d4d8">R</span>
                <input class="text-input key-input" id="edit-key-r" placeholder="e" style="margin-bottom:0">
                <span></span>
                <span class="key-hint">Examples: z, x, q, e, Enter, Space, Escape, Shift, ArrowUp, 1</span>
            </div>

            <div style="display:flex;gap:8px;margin-top:auto;padding-top:14px">
                <button class="btn-primary" style="background:#16a34a" onclick="saveCartEdit()">
                    <i class="fas fa-check" style="margin-right:4px"></i>Save
                </button>
                <button class="btn-primary" style="background:#3f3f46;flex:0 0 80px" onclick="closeCartEditor()">Cancel</button>
            </div>
        </div>
    </div>
    <!-- ══ END SETTINGS ══ -->

    <!-- Screen (60%) -->
    <div class="screen-section">
        <iframe id="game-iframe" src="about:blank" allow="gamepad"></iframe>
    </div>

    <!-- Controls (40%) -->
    <div class="controls-section">
        <div class="shoulder-row">
            <div class="shoulder-btn" id="btn-l" data-btn="4" data-keys="q">L</div>
            <div class="shoulder-btn" id="btn-r" data-btn="5" data-keys="e">R</div>
        </div>

        <div class="main-controls">
            <!-- Joystick -->
            <div class="joystick-base" id="joystick-base">
                <svg class="joystick-guide" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="1">
                    <line x1="50" y1="0"  x2="50"  y2="100"/>
                    <line x1="0"  y1="50" x2="100" y2="50"/>
                    <line x1="15" y1="15" x2="85"  y2="85"/>
                    <line x1="85" y1="15" x2="15"  y2="85"/>
                </svg>
                <div class="joystick-nub" id="joystick-nub"></div>
            </div>

            <!-- YXAB cluster -->
            <div class="action-cluster">
                <div class="btn btn-y" id="btn-y" data-btn="3" data-keys="x">Y</div>
                <div class="btn btn-x" id="btn-x" data-btn="2" data-keys="z">X</div>
                <div class="btn btn-b" id="btn-b" data-btn="1" data-keys="Escape,Shift">B</div>
                <div class="btn btn-a" id="btn-a" data-btn="0" data-keys="Enter,Space">A</div>
            </div>
        </div>

        <div class="menu-row">
            <div class="menu-btn" data-btn="8" data-keys="Tab"></div>
            <div class="menu-btn" data-btn="9" data-keys="p"></div>
        </div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════
// VIRTUAL GAMEPAD
// ════════════════════════════════════════════════
const virtualGamepad = {
    id: "Handheld Virtual Controller",
    index: 0, connected: true,
    timestamp: performance.now(),
    mapping: "standard",
    axes: [0, 0, 0, 0],
    buttons: Array(17).fill(0).map(() => ({ pressed: false, touched: false, value: 0 }))
};
navigator.getGamepads = () => [virtualGamepad, null, null, null];

function triggerConnection() {
    try {
        const ev = new Event('gamepadconnected');
        Object.defineProperty(ev, 'gamepad', { value: virtualGamepad, enumerable: true });
        window.dispatchEvent(ev);
    } catch(e) {}
}

// ════════════════════════════════════════════════
// KEYBOARD BRIDGE
// ════════════════════════════════════════════════
function sendKey(key, type) {
    const fr = document.getElementById('game-iframe');
    if (!fr || !fr.contentWindow) return;
    const code = key.length === 1 ? `Key${key.toUpperCase()}` : key;
    fr.contentWindow.postMessage({ type: 'keyboard-bridge', keyAction: type, key, code }, '*');
    try {
        fr.contentWindow.dispatchEvent(new KeyboardEvent(type, { key, code, bubbles: true, cancelable: true }));
    } catch(e) {}
}

// ════════════════════════════════════════════════
// SPEED FIX
// ════════════════════════════════════════════════
let stayAliveCtx = null;
let speedFixEnabled = localStorage.getItem('vb_speedfix') === '1';

function toggleSpeedFix() { setSpeedFix(!speedFixEnabled); }
function setSpeedFix(on) {
    speedFixEnabled = on;
    localStorage.setItem('vb_speedfix', on ? '1' : '0');
    updateSpeedFixBtn();
    on ? startStayAlive() : stopStayAlive();
}
function startStayAlive() {
    if (stayAliveCtx) return;
    try {
        const AC = window.AudioContext || window.webkitAudioContext;
        stayAliveCtx = new AC();
        const osc = stayAliveCtx.createOscillator(), gain = stayAliveCtx.createGain();
        gain.gain.value = 0.00001;
        osc.connect(gain); gain.connect(stayAliveCtx.destination); osc.start();
    } catch(e) {}
}
function stopStayAlive() { if (stayAliveCtx) { stayAliveCtx.close(); stayAliveCtx = null; } }
function updateSpeedFixBtn() {
    const btn = document.getElementById('speed-fix-btn'); if (!btn) return;
    btn.textContent = speedFixEnabled ? 'Speed Fix: ON' : 'Speed Fix: OFF';
    btn.classList.toggle('active', speedFixEnabled);
}

// ════════════════════════════════════════════════
// VIEW MODE & ASPECT RATIO
// ════════════════════════════════════════════════
let currentMode = localStorage.getItem('vb_mode') || 'original';
let gameAR = JSON.parse(localStorage.getItem('vb_ar') || '{"w":16,"h":9}');
const VIRTUAL_W = 1280;

function applyViewMode() {
    const sc = document.querySelector('.screen-section');
    const fr = document.getElementById('game-iframe');
    const W = sc.clientWidth, H = sc.clientHeight;
    if (!W || !H) return;
    const VH = Math.round(VIRTUAL_W * gameAR.h / gameAR.w);
    fr.style.width = VIRTUAL_W + 'px'; fr.style.height = VH + 'px';
    let scale, left, top;
    if (currentMode === 'original') {
        scale = Math.min(W / VIRTUAL_W, H / VH);
        left = (W - VIRTUAL_W * scale) / 2; top = (H - VH * scale) / 2;
    } else {
        scale = H / VH;
        left = (W - VIRTUAL_W * scale) / 2; top = 0;
    }
    fr.style.transform = `scale(${scale})`; fr.style.transformOrigin = 'top left';
    fr.style.left = left + 'px'; fr.style.top = top + 'px';
}
function setMode(m) { currentMode = m; localStorage.setItem('vb_mode', m); updateModeButtons(); applyViewMode(); }
function setAspectRatio(w, h) { gameAR = {w,h}; localStorage.setItem('vb_ar', JSON.stringify(gameAR)); updateARButtons(); applyViewMode(); }
function updateModeButtons() {
    document.getElementById('mode-btn-original').classList.toggle('active', currentMode==='original');
    document.getElementById('mode-btn-crop').classList.toggle('active', currentMode==='crop');
}
function updateARButtons() {
    const is = gameAR.w===16&&gameAR.h===9;
    document.getElementById('ar-btn-169').classList.toggle('active', is);
    document.getElementById('ar-btn-43').classList.toggle('active', !is);
}
window.addEventListener('resize', applyViewMode);

// ════════════════════════════════════════════════
// JOYSTICK — analog tracking, 8-directional output
// Sends WASD/arrow keys + updates virtual gamepad
// ════════════════════════════════════════════════
const joystickBase = document.getElementById('joystick-base');
const joystickNub  = document.getElementById('joystick-nub');
const STICK_MAX    = 46; // px — max nub travel from center
const STICK_DEAD   = 12; // px — deadzone radius

const STICK_MAP = {
    up:    { gpBtn: 12, keys: ['ArrowUp',    'w'] },
    down:  { gpBtn: 13, keys: ['ArrowDown',  's'] },
    left:  { gpBtn: 14, keys: ['ArrowLeft',  'a'] },
    right: { gpBtn: 15, keys: ['ArrowRight', 'd'] },
};

let stickTouchId = null;
const activeDirs  = new Set();

function stickDirs(dx, dy) {
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < STICK_DEAD) return new Set();
    const deg = ((Math.atan2(dy, dx) * 180 / Math.PI) + 360) % 360;
    const s = new Set();
    if      (deg >= 337.5 || deg < 22.5)  s.add('right');
    else if (deg < 67.5)                  { s.add('right'); s.add('down'); }
    else if (deg < 112.5)                 s.add('down');
    else if (deg < 157.5)                 { s.add('down'); s.add('left'); }
    else if (deg < 202.5)                 s.add('left');
    else if (deg < 247.5)                 { s.add('left'); s.add('up'); }
    else if (deg < 292.5)                 s.add('up');
    else                                  { s.add('up'); s.add('right'); }
    return s;
}

function applyStick(want) {
    for (const dir of want) {
        if (!activeDirs.has(dir)) {
            const m = STICK_MAP[dir];
            m.keys.forEach(k => sendKey(k, 'keydown'));
            virtualGamepad.buttons[m.gpBtn].pressed = true;
            virtualGamepad.buttons[m.gpBtn].value   = 1;
            activeDirs.add(dir);
        }
    }
    for (const dir of [...activeDirs]) {
        if (!want.has(dir)) {
            const m = STICK_MAP[dir];
            m.keys.forEach(k => sendKey(k, 'keyup'));
            virtualGamepad.buttons[m.gpBtn].pressed = false;
            virtualGamepad.buttons[m.gpBtn].value   = 0;
            activeDirs.delete(dir);
        }
    }
    // Update analog axes
    virtualGamepad.axes[0] = want.has('right') ? 1 : want.has('left') ? -1 : 0;
    virtualGamepad.axes[1] = want.has('down')  ? 1 : want.has('up')   ? -1 : 0;
    virtualGamepad.timestamp = performance.now();
    try { document.getElementById('game-iframe').contentWindow.focus(); } catch(e) {}
}

function moveStick(cx, cy) {
    const r   = joystickBase.getBoundingClientRect();
    const dx  = cx - (r.left + r.width  / 2);
    const dy  = cy - (r.top  + r.height / 2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    // Clamp nub position
    const clamp = Math.min(dist, STICK_MAX);
    const angle = Math.atan2(dy, dx);
    const nx = dist > 0 ? Math.cos(angle) * clamp : 0;
    const ny = dist > 0 ? Math.sin(angle) * clamp : 0;
    joystickNub.style.transform = `translate(calc(-50% + ${nx.toFixed(1)}px), calc(-50% + ${ny.toFixed(1)}px))`;
    applyStick(stickDirs(dx, dy));
}

function releaseStick() {
    joystickNub.style.transform = 'translate(-50%, -50%)';
    joystickBase.classList.remove('active');
    applyStick(new Set());
    stickTouchId = null;
}

joystickBase.addEventListener('touchstart', e => {
    e.preventDefault();
    if (stickTouchId === null) {
        stickTouchId = e.changedTouches[0].identifier;
        joystickBase.classList.add('active');
        moveStick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
}, { passive: false });
joystickBase.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) if (t.identifier === stickTouchId) { moveStick(t.clientX, t.clientY); break; }
}, { passive: false });
['touchend','touchcancel'].forEach(ev => joystickBase.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) if (t.identifier === stickTouchId) { releaseStick(); break; }
}, { passive: false }));
joystickBase.addEventListener('mousedown', e => {
    e.preventDefault(); joystickBase.classList.add('active'); moveStick(e.clientX, e.clientY);
    const mm = e => moveStick(e.clientX, e.clientY);
    const mu = () => { releaseStick(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
    window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu);
});

let doubleModeActive = false; // kept for handleBtnInput compatibility

// ════════════════════════════════════════════════
// ACTION BUTTONS — per-touch-ID
// ════════════════════════════════════════════════
function handleBtnInput(el, pressed) {
    const bidx  = el.getAttribute('data-btn');
    const bidxs = el.getAttribute('data-btns');
    const keys  = (el.getAttribute('data-keys') || '').split(',').map(k=>k.trim()).filter(Boolean);

    const gp = i => { const n=parseInt(i); virtualGamepad.buttons[n].pressed=pressed; virtualGamepad.buttons[n].value=pressed?1:0; };
    if (bidx)  gp(bidx);
    if (bidxs) bidxs.split(',').forEach(gp);

    if (pressed) {
        if (doubleModeActive) {
            // Full double-tap cycle: keydown → keyup → keydown (held until finger lifts)
            keys.forEach(k => sendKey(k, 'keydown'));
            setTimeout(() => keys.forEach(k => sendKey(k, 'keyup')),   60);
            setTimeout(() => keys.forEach(k => sendKey(k, 'keydown')), 120);
        } else {
            keys.forEach(k => sendKey(k, 'keydown'));
        }
        el.classList.add('active');
    } else {
        keys.forEach(k => sendKey(k, 'keyup'));
        el.classList.remove('active');
    }

    virtualGamepad.timestamp = performance.now();
    try { document.getElementById('game-iframe').contentWindow.focus(); } catch(e) {}
}

function wireButton(btn) {
    let tid = null;
    btn.addEventListener('touchstart', e => {
        e.preventDefault(); e.stopPropagation();
        if (tid === null) { tid = e.changedTouches[0].identifier; handleBtnInput(btn, true); }
    }, { passive: false });
    btn.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
    btn.addEventListener('touchend', e => {
        e.preventDefault();
        for (const t of e.changedTouches) if (t.identifier === tid) { tid = null; handleBtnInput(btn, false); break; }
    }, { passive: false });
    btn.addEventListener('touchcancel', () => { if (tid !== null) { tid = null; handleBtnInput(btn, false); } }, { passive: false });
    btn.addEventListener('mousedown', e => {
        e.preventDefault(); handleBtnInput(btn, true);
        const mu = () => { handleBtnInput(btn, false); window.removeEventListener('mouseup', mu); };
        window.addEventListener('mouseup', mu);
    });
}

document.querySelectorAll('.btn, .shoulder-btn, .menu-btn').forEach(wireButton);

// ════════════════════════════════════════════════
// CARTRIDGE LIBRARY
// ════════════════════════════════════════════════
function loadCarts()   { try { return JSON.parse(localStorage.getItem('vb_cartridges')||'[]'); } catch{ return []; } }
function saveCarts(c)  { localStorage.setItem('vb_cartridges', JSON.stringify(c)); }

function hostOf(url)   { try { return new URL(url).hostname.replace(/^www\./,''); } catch{ return url.slice(0,20); } }
function nameOf(url)   { try { return new URL(url).hostname.replace(/^www\./,'').split('.')[0].replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); } catch{ return 'Game'; } }
function esc(s)        { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addCart(url) {
    const carts = loadCarts();
    if (carts.find(c => c.url === url)) return;
    carts.unshift({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
        url, name: nameOf(url), art: '',
        keys: { a:'Enter,Space', b:'Escape,Shift', x:'z', y:'x', l:'q', r:'e' }
    });
    saveCarts(carts);
}

function deleteCart(id) { saveCarts(loadCarts().filter(c=>c.id!==id)); renderLibrary(); }

function applyCartKeys(cart) {
    if (!cart?.keys) return;
    [['btn-a',cart.keys.a],['btn-b',cart.keys.b],['btn-x',cart.keys.x],['btn-y',cart.keys.y],
     ['btn-l',cart.keys.l],['btn-r',cart.keys.r]].forEach(([id,k]) => {
        if (k) { const el=document.getElementById(id); if(el) el.setAttribute('data-keys',k); }
    });
}

function playCart(id) {
    const cart = loadCarts().find(c=>c.id===id); if (!cart) return;
    applyCartKeys(cart);
    document.getElementById('url-input').value = cart.url;
    document.getElementById('game-iframe').src  = cart.url;
    localStorage.setItem('vb_url_v2', cart.url);
    toggleSettings();
    setTimeout(triggerConnection, 1000);
    setTimeout(applyViewMode, 100);
}

function renderLibrary() {
    const grid  = document.getElementById('cartridge-grid');
    const carts = loadCarts();
    if (!carts.length) {
        grid.innerHTML = '<div class="cart-empty">No saved games yet.<br>Paste a URL, tick "Save this game",<br>then launch.</div>';
        return;
    }
    grid.innerHTML = carts.map(c => {
        const art = c.art ? `<img src="${esc(c.art)}" alt="" onerror="this.style.display='none'">` : '';
        return `
        <div class="cart-card">
            <div class="cart-art">${art}${!c.art?`<span class="cart-initial">${esc((c.name||'?')[0].toUpperCase())}</span>`:''}<div class="cart-notch"></div></div>
            <div class="cart-body">
                <div class="cart-name" title="${esc(c.name)}">${esc(c.name)}</div>
                <div class="cart-host">${esc(hostOf(c.url))}</div>
                <div class="cart-actions">
                    <button class="cart-play" onclick="playCart('${c.id}')">▶ Play</button>
                    <button class="cart-edit" onclick="openCartEditor('${c.id}')"><i class="fas fa-pen"></i></button>
                    <button class="cart-del"  onclick="deleteCart('${c.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// Cart editor
let editingId = null;
function openCartEditor(id) {
    const cart = loadCarts().find(c=>c.id===id); if (!cart) return;
    editingId = id;
    document.getElementById('edit-name').value  = cart.name || '';
    document.getElementById('edit-art').value   = cart.art  || '';
    document.getElementById('edit-key-a').value = cart.keys?.a || 'Enter,Space';
    document.getElementById('edit-key-b').value = cart.keys?.b || 'Escape,Shift';
    document.getElementById('edit-key-x').value = cart.keys?.x || 'z';
    document.getElementById('edit-key-y').value = cart.keys?.y || 'x';
    document.getElementById('edit-key-l').value = cart.keys?.l || 'q';
    document.getElementById('edit-key-r').value = cart.keys?.r || 'e';
    document.getElementById('cart-editor').style.display = 'flex';
}
function closeCartEditor() { editingId = null; document.getElementById('cart-editor').style.display = 'none'; }
function saveCartEdit() {
    if (!editingId) return;
    const carts = loadCarts();
    const cart  = carts.find(c=>c.id===editingId);
    if (cart) {
        cart.name = document.getElementById('edit-name').value.trim() || cart.name;
        cart.art  = document.getElementById('edit-art').value.trim();
        cart.keys = {
            a: document.getElementById('edit-key-a').value.trim() || 'Enter,Space',
            b: document.getElementById('edit-key-b').value.trim() || 'Escape,Shift',
            x: document.getElementById('edit-key-x').value.trim() || 'z',
            y: document.getElementById('edit-key-y').value.trim() || 'x',
            l: document.getElementById('edit-key-l').value.trim() || 'q',
            r: document.getElementById('edit-key-r').value.trim() || 'e',
        };
        saveCarts(carts);
    }
    closeCartEditor(); renderLibrary();
}

// ════════════════════════════════════════════════
// SETTINGS UI
// ════════════════════════════════════════════════
function toggleSettings() {
    const ov = document.getElementById('settings-overlay');
    const showing = ov.style.display === 'flex';
    ov.style.display = showing ? 'none' : 'flex';
    if (!showing) {
        showTab('settings');
        document.getElementById('url-input').value = localStorage.getItem('vb_url_v2') || '';
    }
}

function showTab(tab) {
    ['settings','library'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
        document.getElementById(`tab-btn-${t}`).classList.toggle('active', t===tab);
    });
    document.getElementById('settings-footer').style.display = tab==='settings' ? 'flex' : 'none';
    if (tab==='library') renderLibrary();
}

function saveUrlToLibrary() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    addCart(url);
    // Brief visual confirmation on the button
    const btn = event.currentTarget;
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check" style="margin-right:5px"></i>Saved!';
    btn.style.background = '#15803d';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#16a34a'; }, 1200);
}

function saveSettings() {
    const url = document.getElementById('url-input').value.trim() || 'https://www.google.com/logos/2010/pacman10-i.html';
    document.getElementById('game-iframe').src = url;
    localStorage.setItem('vb_url_v2', url);
    toggleSettings();
    setTimeout(triggerConnection, 1000);
    setTimeout(applyViewMode, 100);
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
window.onload = () => {
    updateModeButtons(); updateARButtons(); updateSpeedFixBtn();
    if (speedFixEnabled) startStayAlive();

    const lastUrl = localStorage.getItem('vb_url_v2');
    if (lastUrl) {
        document.getElementById('game-iframe').src  = lastUrl;
        document.getElementById('url-input').value  = lastUrl;
    }
    setTimeout(applyViewMode, 150);

    const init = () => {
        triggerConnection();
        document.body.removeEventListener('touchstart', init);
        document.body.removeEventListener('mousedown',  init);
    };
    document.body.addEventListener('touchstart', init);
    document.body.addEventListener('mousedown',  init);
};
</script>
