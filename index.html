<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebHandheld Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --body-color: #1c1c1e;
            --screen-bg: #000;
            --button-color: #2c2c2e;
            --accent-color: #3a3a3c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none;
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--body-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen-section {
            width: 100%;
            flex: 0 0 60%; 
            background: #000;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .controls-section {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            padding: 10px 20px env(safe-area-inset-bottom);
            justify-content: space-around;
            background: linear-gradient(to bottom, #2c2c2e, #1c1c1e);
            border-top: 1px solid #3a3a3c;
            position: relative;
        }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* D-Pad Container */
        .dpad-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* D-Pad / Joystick Hybrid */
        .dpad-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 2px 10px rgba(0,0,0,1);
            touch-action: none;
        }

        .dpad-hat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #2c2c2e;
            background: conic-gradient(from 0deg, #3a3a3c, #1a1a1c 45deg, #2c2c2e 90deg, #111 135deg, #3a3a3c 180deg, #1a1a1c 225deg, #2c2c2e 270deg, #111 315deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 5;
            transition: transform 0.1s ease-out;
        }

        /* Joystick Zones */
        .joystick-hitbox {
            position: absolute;
            inset: 0;
            z-index: 20;
            border-radius: 50%;
        }

        /* Double Modifier Button */
        .modifier-btn {
            width: 50px;
            height: 50px;
            background: #2c2c2e;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
            color: #888;
            font-size: 0.7rem;
            font-weight: bold;
            box-shadow: 0 3px 0 #000;
        }
        .modifier-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #000;
        }

        /* ABXY Cluster */
        .action-cluster {
            display: grid;
            grid-template-areas: ". y ." "x . b" ". a .";
            gap: 12px;
            width: 150px;
            height: 150px;
        }
        .btn-a { grid-area: a; color: #4ade80; }
        .btn-b { grid-area: b; color: #f87171; }
        .btn-x { grid-area: x; color: #60a5fa; }
        .btn-y { grid-area: y; color: #facc15; }

        .btn {
            width: 100%; height: 100%; background: #2c2c2e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; box-shadow: 0 5px 0 #000;
            font-size: 1.3rem; border: 1px solid #3a3a3c;
        }

        .btn.active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
            filter: brightness(1.3);
        }

        .shoulder-row { display: flex; justify-content: space-between; width: 100%; }
        .shoulder-btn {
            width: 35%; height: 40px; background: #2c2c2e; border-radius: 10px; border: 1px solid #3a3a3c;
            color: #8e8e93; font-weight: bold; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 3px 0 #000;
        }

        .menu-row { display: flex; justify-content: center; align-items: center; gap: 40px; }
        .menu-btn { width: 45px; height: 12px; background: #111; border-radius: 6px; border-bottom: 2px solid #444; }

        /* Settings */
        #settings-overlay {
            position: absolute; inset: 0; background: rgba(10, 10, 12, 0.98);
            z-index: 100; display: none; flex-direction: column; padding: 40px 24px; color: white;
        }

        .gear-icon {
            position: absolute; top: 15px; right: 15px; z-index: 50; color: #fff;
            background: rgba(0,0,0,0.4); border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        input { background: #2c2c2e; color: white; border: 1px solid #444; padding: 15px; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="gear-icon" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <div id="settings-overlay">
            <h2 class="text-2xl font-bold mb-8">Console Settings</h2>
            <div class="mb-6">
                <label class="text-xs text-zinc-500 uppercase tracking-widest font-bold">Game URL</label>
                <input type="text" id="url-input" placeholder="https://..." class="mt-2">
            </div>
            <button onclick="saveSettings()" class="bg-blue-600 py-4 rounded-xl font-bold text-lg">LAUNCH ENGINE</button>
            <button onclick="toggleSettings()" class="text-zinc-500 py-4 mt-2">CLOSE</button>
        </div>

        <div class="screen-section">
            <iframe id="game-iframe" src="about:blank" scrolling="no" allow="autoplay; gamepad"></iframe>
        </div>

        <div class="controls-section">
            <div class="shoulder-row">
                <div class="shoulder-btn" id="btn-l" data-btn="4" data-keys="q,z">L</div>
                <div class="shoulder-btn" id="btn-r" data-btn="5" data-keys="e,c">R</div>
            </div>

            <div class="main-controls">
                <div class="dpad-container">
                    <div class="dpad-wrapper" id="joystick-boundary">
                        <div class="dpad-hat" id="joystick-hat"></div>
                        <div class="joystick-hitbox"></div>
                    </div>
                    <div class="modifier-btn" id="double-btn">
                        <span>DBL</span>
                        <span class="text-[9px] opacity-50">HOLD</span>
                    </div>
                </div>

                <div class="action-cluster">
                    <div class="btn btn-y" data-btn="3" data-keys="i,Shift,y">Y</div>
                    <div class="btn btn-x" data-btn="2" data-keys="j,x,Control">X</div>
                    <div class="btn btn-b" data-btn="1" data-keys="Escape,Shift,k">B</div>
                    <div class="btn btn-a" data-btn="0" data-keys="Enter, ,z">A</div>
                </div>
            </div>

            <div class="menu-row">
                <div class="menu-btn" data-btn="8" data-keys="Tab"></div>
                <div class="menu-btn" data-btn="9" data-keys="p,Enter"></div>
            </div>
        </div>
    </div>

    <script>
        // Global State
        const virtualGamepad = {
            id: "Handheld Virtual Controller",
            index: 0, connected: true, timestamp: performance.now(), mapping: "standard",
            axes: [0, 0, 0, 0],
            buttons: Array(17).fill(0).map(() => ({ pressed: false, touched: false, value: 0 }))
        };

        navigator.getGamepads = () => [virtualGamepad, null, null, null];

        let isDoubleHeld = false;
        let activeDirectionKeys = new Set();

        // Helper: Send Keyboard Events to Iframe
        function sendKey(key, type) {
            const iframe = document.getElementById('game-iframe');
            if (!iframe.contentWindow) return;
            try {
                iframe.contentWindow.postMessage({ 
                    type: 'keyboard-bridge', 
                    keyAction: type, 
                    key: key,
                    code: key === ' ' ? 'Space' : key
                }, "*");
            } catch (err) {}
        }

        // Joystick Logic
        const boundary = document.getElementById('joystick-boundary');
        const hat = document.getElementById('joystick-hat');
        let isDragging = false;

        function updateJoystick(e) {
            if (!isDragging) return;
            const rect = boundary.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            const distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            const maxRadius = rect.width / 2;

            if (distance > maxRadius) {
                deltaX *= maxRadius / distance;
                deltaY *= maxRadius / distance;
            }

            // Visual Tilt/Move
            const tiltX = (deltaX / maxRadius) * 15;
            const tiltY = (deltaY / maxRadius) * 15;
            hat.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px)) rotateX(${-tiltY}deg) rotateY(${tiltX}deg)`;

            // Gamepad Axes
            virtualGamepad.axes[0] = deltaX / maxRadius;
            virtualGamepad.axes[1] = deltaY / maxRadius;

            // Directional Buttons (D-Pad Emulation)
            const deadzone = 0.3;
            updateDirection(12, deltaY / maxRadius < -deadzone, 'ArrowUp');
            updateDirection(13, deltaY / maxRadius > deadzone, 'ArrowDown');
            updateDirection(14, deltaX / maxRadius < -deadzone, 'ArrowLeft');
            updateDirection(15, deltaX / maxRadius > deadzone, 'ArrowRight');
        }

        function updateDirection(btnIdx, isActive, key) {
            const wasActive = virtualGamepad.buttons[btnIdx].pressed;
            
            if (isActive !== wasActive) {
                virtualGamepad.buttons[btnIdx].pressed = isActive;
                virtualGamepad.buttons[btnIdx].value = isActive ? 1 : 0;
                
                if (isActive) {
                    if (isDoubleHeld) {
                        sendKey(key, 'keyup');
                        setTimeout(() => sendKey(key, 'keydown'), 10);
                    } else {
                        sendKey(key, 'keydown');
                    }
                } else {
                    sendKey(key, 'keyup');
                }
            }
        }

        boundary.addEventListener('touchstart', (e) => { isDragging = true; updateJoystick(e); }, {passive: false});
        window.addEventListener('touchmove', updateJoystick, {passive: false});
        window.addEventListener('touchend', () => {
            isDragging = false;
            hat.style.transform = 'translate(-50%, -50%)';
            virtualGamepad.axes[0] = 0; virtualGamepad.axes[1] = 0;
            [12, 13, 14, 15].forEach(i => updateDirection(i, false, ''));
        });

        // Double Modifier Logic
        const dblBtn = document.getElementById('double-btn');
        dblBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDoubleHeld = true;
            dblBtn.classList.add('active');
        });
        dblBtn.addEventListener('touchend', () => {
            isDoubleHeld = false;
            dblBtn.classList.remove('active');
        });

        // Action Buttons (ABXY)
        function handleAction(el, isPressed) {
            const btnIdx = el.getAttribute('data-btn');
            const keys = el.getAttribute('data-keys').split(',');

            if (btnIdx !== null) {
                const i = parseInt(btnIdx);
                virtualGamepad.buttons[i].pressed = isPressed;
                virtualGamepad.buttons[i].value = isPressed ? 1 : 0;
            }

            keys.forEach(k => sendKey(k, isPressed ? 'keydown' : 'keyup'));

            if (isPressed) el.classList.add('active');
            else el.classList.remove('active');
            
            virtualGamepad.timestamp = performance.now();
        }

        document.querySelectorAll('.btn, .shoulder-btn, .menu-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(btn, true); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); handleAction(btn, false); });
        });

        // Settings
        function toggleSettings() {
            const ov = document.getElementById('settings-overlay');
            ov.style.display = ov.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveSettings() {
            const url = document.getElementById('url-input').value || 'https://www.google.com/logos/2010/pacman10-i.html';
            document.getElementById('game-iframe').src = url;
            localStorage.setItem('vb_url_v11', url);
            toggleSettings();
        }

        window.onload = () => {
            document.getElementById('url-input').value = localStorage.getItem('vb_url_v11') || '';
            saveSettings();
        };

        // Gamepad Connection Loop
        setInterval(() => {
            const event = new Event('gamepadconnected');
            Object.defineProperty(event, 'gamepad', { value: virtualGamepad, enumerable: true });
            window.dispatchEvent(event);
        }, 2000);
    </script>
</body>
</html>
